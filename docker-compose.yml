services:
  postgres:
    image: postgres:16
    container_name: nba_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: minnesota_subs
    ports:
      - "5433:5432"
    volumes:
      - nba_pgdata:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    container_name: nba_metabase
    ports:
      - "3001:3000"
    depends_on:
      - postgres

volumes:
  nba_pgdata: